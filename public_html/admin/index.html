<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard - GetMyBin</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Check if logged in as admin, redirect to panel or login
    const token = localStorage.getItem('adminToken');
    if (!token) {
      window.location.href = '/admin-login.html';
    } else {
      window.location.href = '/admin-panel.html';
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
