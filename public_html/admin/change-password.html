<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password - GetMyBin Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; padding: 24px; }
    .container { max-width: 500px; }
    h1 { color: #0f766e; margin-bottom: 8px; font-size: 1.8rem; }
    .subtitle { color: #64748b; font-size: 0.95rem; margin-bottom: 24px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.95rem; font-weight: 600; color: #334155; margin-bottom: 8px; }
    input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 1rem; font-family: inherit; }
    input:focus { outline: none; border-color: #71b80c; box-shadow: 0 0 0 3px rgba(113, 184, 12, 0.1); }
    .button-group { display: flex; gap: 12px; margin-top: 28px; }
    button { padding: 12px 24px; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-submit { background: linear-gradient(135deg, #71b80c, #5a9409); color: white; flex: 1; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(113, 184, 12, 0.3); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-cancel { background: #e2e8f0; color: #334155; flex: 1; }
    .btn-cancel:hover { background: #cbd5e1; }
    .message { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 0.95rem; display: none; }
    .message.error { background: #fee2e2; color: #dc2626; display: block; }
    .message.success { background: #d1fae5; color: #059669; display: block; }
    .password-strength { font-size: 0.85rem; margin-top: 6px; padding: 8px; border-radius: 4px; display: none; }
    .password-strength.weak { display: block; background: #fef3c7; color: #92400e; }
    .password-strength.fair { display: block; background: #fef3c7; color: #92400e; }
    .password-strength.good { display: block; background: #d1fae5; color: #065f46; }
    .password-strength.strong { display: block; background: #d1fae5; color: #065f46; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔒 Change Password</h1>
    <p class="subtitle">Update your admin account password</p>

    <form id="changePasswordForm">
      <div class="form-group">
        <label for="currentPassword">Current Password</label>
        <input type="password" id="currentPassword" name="currentPassword" placeholder="Enter your current password" required>
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" name="newPassword" placeholder="Enter a strong new password" required>
        <div class="password-strength" id="passwordStrength"></div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm New Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your new password" required>
      </div>

      <div class="button-group">
        <button type="submit" class="btn-submit">Save Changes</button>
        <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
      </div>

      <div class="message" id="message"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('changePasswordForm');
    const newPasswordInput = document.getElementById('newPassword');
    const passwordStrengthDiv = document.getElementById('passwordStrength');
    const messageDiv = document.getElementById('message');
    const cancelBtn = document.getElementById('cancelBtn');

    // Password strength checker
    newPasswordInput.addEventListener('input', function() {
      const password = this.value;
      let strength = 'weak';
      let message = 'Weak';

      if (password.length >= 8 && /[A-Z]/.test(password) && /[0-9]/.test(password) && /[!@#$%^&*]/.test(password)) {
        strength = 'strong';
        message = '✓ Strong password';
      } else if (password.length >= 8 && /[A-Z]/.test(password) && /[0-9]/.test(password)) {
        strength = 'good';
        message = '✓ Good password';
      } else if (password.length >= 8) {
        strength = 'fair';
        message = '⚠ Fair password';
      }

      passwordStrengthDiv.className = 'password-strength ' + strength;
      passwordStrengthDiv.textContent = message;
    });

    cancelBtn.addEventListener('click', function() {
      if (confirm('Discard changes?')) {
        form.reset();
        passwordStrengthDiv.className = 'password-strength';
        messageDiv.className = 'message';
      }
    });

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // Validation
      if (newPassword !== confirmPassword) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'New passwords do not match';
        return;
      }

      if (newPassword === currentPassword) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'New password must be different from current password';
        return;
      }

      if (newPassword.length < 8) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Password must be at least 8 characters';
        return;
      }

      // Submit to backend
      const submitBtn = form.querySelector('.btn-submit');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving...';

      try {
        const response = await fetch('/api/admin-auth/change-password.php', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + localStorage.getItem('adminToken')
          },
          body: JSON.stringify({
            email: localStorage.getItem('adminEmail'),
            currentPassword,
            newPassword
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to change password');
        }

        messageDiv.className = 'message success';
        messageDiv.textContent = '✓ Password changed successfully! You will be logged out shortly.';
        form.reset();
        passwordStrengthDiv.className = 'password-strength';

        setTimeout(() => {
          localStorage.removeItem('adminToken');
          localStorage.removeItem('adminEmail');
          window.parent.location.href = '/admin-login.html';
        }, 2000);
      } catch (err) {
        console.error('Error:', err);
        messageDiv.className = 'message error';
        messageDiv.textContent = err.message;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save Changes';
      }
    });
  </script>
</body>
</html>
