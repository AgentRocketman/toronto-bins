  <!-- Load Google Maps API with key from secure backend.
       Exposes window.googleMapsReady (Promise) so the rest of the page can wait on it. -->
  <script>
    window.googleMapsReady = (async function() {
      try {
        const response = await fetch('/api/maps-key.php');
        const data = await response.json();
        await new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = `https://maps.googleapis.com/maps/api/js?key=${data.key}&libraries=geometry,places`;
          script.onload = resolve;
          script.onerror = () => reject(new Error('Google Maps script failed to load'));
          document.head.appendChild(script);
        });
        // Wait one tick for google.maps namespace to be populated
        let attempts = 0;
        while ((!window.google || !window.google.maps) && attempts < 50) {
          await new Promise(r => setTimeout(r, 50));
          attempts++;
        }
      } catch (e) {
        console.error('Failed to load Google Maps API:', e);
      }
    })();
  </script>

(function(){
  var token = localStorage.getItem('getmybin_emp_token');
  if (!token) { window.location.href = '/employee-login.html'; return; }
  fetch('/api/auth/verify.php', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (!d.valid) { localStorage.removeItem('getmybin_emp_token'); window.location.href = '/employee-login.html'; return; }
      // Set employee name in worker input
      var nameInput = document.getElementById('workerNameInput');
      if (nameInput) nameInput.value = d.firstName;
      // Show employee greeting
      var greet = document.getElementById('emp-greeting');
      if (greet) greet.textContent = 'Hi, ' + d.firstName + '!';
    })
    .catch(function(){ window.location.href = '/employee-login.html'; });
})();
</script>

  <script>
    // Config
    // Google Maps API key is now loaded securely from /api/maps-key.php
    const API_BASE_URL = window.location.origin + '/api'; // PHP API on same domain
    let BACKEND_READY = false; // Will be set to true when backend responds

    // Service stops data with fallback coordinates
    const serviceStops = [
      // Rollouts
      { id: 'ro-1', address: '500 Bloor St W, Toronto', type: 'rollout', completed: false, imageUrl: null, lat: 43.6679, lng: -79.4065 },
      { id: 'ro-2', address: '100 Front St W, Toronto', type: 'rollout', completed: false, imageUrl: null, lat: 43.6426, lng: -79.3871 },
      { id: 'ro-3', address: '350 King St W, Toronto', type: 'rollout', completed: false, imageUrl: null, lat: 43.6452, lng: -79.3917 },
      { id: 'ro-4', address: '1200 Bay St, Toronto', type: 'rollout', completed: false, imageUrl: null, lat: 43.6705, lng: -79.3876 },
      // Roll-Ins
      { id: 'ri-1', address: '2020 Roncesvalles Ave, Toronto', type: 'rollin', completed: false, imageUrl: null, lat: 43.6529, lng: -79.4719 },
      { id: 'ri-2', address: '1 Bloor St E, Toronto', type: 'rollin', completed: false, imageUrl: null, lat: 43.6629, lng: -79.3857 },
      { id: 'ri-3', address: '1 Dundas St W, Toronto', type: 'rollin', completed: false, imageUrl: null, lat: 43.6559, lng: -79.3857 },
      { id: 'ri-4', address: '120 Roncesvalles Ave, Toronto', type: 'rollin', completed: false, imageUrl: null, lat: 43.6389, lng: -79.4719 }
    ];

    let map;
    let markers = [];
    let directionsRenderer;
    let currentStops = [...serviceStops];
    let optimizedRoute = [];
    let currentInfoWindow = null;
    let driverLocation = null;
    let sequenceNumbers = {};
    let driverMarker = null;
    let locationRefreshInterval = null;

    // Initialize
    function init() {
      initMap();
      setTodayDate();
      loadWorkerName();
      getDriverLocation();
      console.log('Service routing initialized with', currentStops.length, 'stops');
    }

    // Get driver's current location
    function getDriverLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            driverLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };
            console.log('🚗 Driver location detected:', driverLocation);
            sortAndRender();
            startLocationRefresh();
          },
          (error) => {
            console.warn('⚠️ Geolocation unavailable:', error.message);
            driverLocation = { lat: 43.6629, lng: -79.3957 };
            sortAndRender();
            startLocationRefresh();
          }
        );
      } else {
        console.warn('⚠️ Geolocation not supported');
        driverLocation = { lat: 43.6629, lng: -79.3957 };
        sortAndRender();
        startLocationRefresh();
      }
    }

    // Refresh driver location every 5 seconds
    function startLocationRefresh() {
      if (locationRefreshInterval) clearInterval(locationRefreshInterval);
      
      locationRefreshInterval = setInterval(() => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              const newLat = position.coords.latitude;
              const newLng = position.coords.longitude;
              if (driverLocation && (driverLocation.lat !== newLat || driverLocation.lng !== newLng)) {
                driverLocation.lat = newLat;
                driverLocation.lng = newLng;
                console.log('🚗 Location updated:', driverLocation);
                updateDriverMarker(); // Only update marker position, don't recenter map or re-sort
              }
            },
            (error) => {
              console.warn('⚠️ Location refresh failed:', error.message);
            }
          );
        }
      }, 5000); // 5 seconds
    }

    // Sort stops by proximity (Roll-Ins first, then Roll-Outs, closest first)
    function sortAndRender() {
      if (!driverLocation) return;

      function haversine(lat1, lng1, lat2, lng2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLng/2) * Math.sin(dLng/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
      }

      currentStops.forEach(stop => {
        stop.distance = haversine(driverLocation.lat, driverLocation.lng, stop.lat, stop.lng);
      });

      currentStops.sort((a, b) => {
        if (a.type !== b.type) {
          return a.type === 'rollin' ? -1 : 1;
        }
        return a.distance - b.distance;
      });

      sequenceNumbers = {};
      currentStops.forEach((stop, idx) => {
        sequenceNumbers[stop.id] = idx + 1;
      });

      console.log('✓ Sorted by proximity (Roll-Ins first)');
      renderServiceList();
      renderMarkers(currentStops);
      updateMapCenter();
    }

    // Center map on driver location
    function updateMapCenter() {
      if (driverLocation && map) {
        map.setCenter(driverLocation);
        createDriverMarker();
      }
    }

    // Create car emoji icon for driver
    function createDriverMarker() {
      if (driverMarker) {
        driverMarker.setMap(null);
      }
      
      // Use car emoji - create as SVG-based marker with emoji
      const emojiSvg = `data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='70' font-size='80' text-anchor='middle'%3E%F0%9F%9A%97%3C/text%3E%3C/svg%3E`;
      
      driverMarker = new google.maps.Marker({
        position: driverLocation,
        map: map,
        title: '🚗 Your Location',
        icon: {
          url: emojiSvg,
          scaledSize: new google.maps.Size(50, 50),
          origin: new google.maps.Point(0, 0),
          anchor: new google.maps.Point(25, 25)
        }
      });
    }

    // Update driver marker position (without recentering map)
    function updateDriverMarker() {
      if (!driverMarker || !map) {
        createDriverMarker();
      } else if (driverLocation) {
        driverMarker.setPosition(driverLocation);

    // Calculate optimal route via backend
    function calculateOptimalRoute() {
      if (currentStops.length === 0) return;

      // Prepare stops with coordinates
      const stopsData = currentStops.map(stop => ({
        id: stop.id,
        address: stop.address,
        lat: stop.lat,
        lng: stop.lng,
        type: stop.type
      }));

      fetch(API_BASE_URL + '/optimize-route.php', {

        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ stops: stopsData })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success && data.optimizedIds) {
          // Reorder stops based on optimized IDs
          const ordered = data.optimizedIds
            .map(id => currentStops.find(s => s.id === id))
            .filter(s => s);
          optimizedRoute = ordered.length > 0 ? ordered : currentStops;
          console.log('Route optimized. Distance:', data.distance, 'Duration:', data.duration);
        } else {
          optimizedRoute = [...currentStops];
        }
        renderServiceList();
        renderMarkers(optimizedRoute);
      })
      .catch(err => {
        console.warn('Route optimization failed, using original order:', err);
        optimizedRoute = [...currentStops];
        renderMarkers(currentStops);
      });
    }

    // Draw simple route (fallback)
    function drawRoute(stops) {
      if (stops.length === 0) return;
      
      const geocoder = new google.maps.Geocoder();
      const coords = [];

      stops.forEach((stop, idx) => {
        geocoder.geocode({ address: stop.address }, (results, status) => {
          if (status === google.maps.GeocoderStatus.OK && results[0]) {
            coords[idx] = results[0].geometry.location;
            if (coords.filter(c => c).length === stops.length) {
              const polyline = new google.maps.Polyline({
                path: coords,
                geodesic: true,
                strokeColor: '#0f766e',
                strokeOpacity: 0.8,
                strokeWeight: 3,
                map: map
              });
            }
          }
        });
      });
    }

    // Compress image before upload
    function compressImage(file, statusDiv) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        
        reader.onload = (e) => {
          const img = new Image();
          
          img.onload = () => {
            // Update status
            if (statusDiv) {
              statusDiv.textContent = '🖼️ Compressing image...';
              statusDiv.classList.add('show');
            }

            // Calculate new dimensions (max 1200x900, maintain aspect ratio)
            let newWidth = img.width;
            let newHeight = img.height;
            const maxWidth = 1200;
            const maxHeight = 900;

            if (newWidth > maxWidth || newHeight > maxHeight) {
              const aspectRatio = newWidth / newHeight;
              
              if (newWidth > maxWidth) {
                newWidth = maxWidth;
                newHeight = newWidth / aspectRatio;
              }
              
              if (newHeight > maxHeight) {
                newHeight = maxHeight;
                newWidth = newHeight * aspectRatio;
              }
            }

            // Create canvas and draw resized image
            const canvas = document.createElement('canvas');
            canvas.width = newWidth;
            canvas.height = newHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, newWidth, newHeight);

            // Compress to JPEG blob with 70% quality
            canvas.toBlob(
              (blob) => {
                const originalSize = (file.size / 1024).toFixed(2);
                const compressedSize = (blob.size / 1024).toFixed(2);
                console.log(`📦 Image compressed: ${originalSize}KB → ${compressedSize}KB`);
                
                // Update status with compression results
                if (statusDiv) {
                  statusDiv.textContent = `✓ Compressed: ${originalSize}KB → ${compressedSize}KB`;
                }

                resolve(blob);
              },
              'image/jpeg',
              0.7 // 70% quality
            );
          };

          img.onerror = () => {
            reject(new Error('Failed to load image'));
          };

          img.src = e.target.result;
        };

        reader.onerror = () => {
          reject(new Error('Failed to read file'));
        };

        reader.readAsDataURL(file);
      });
    }

    function uploadImage(stopId, file, statusDiv) {
      if (!file) return;

      const stop = currentStops.find(s => s.id === stopId);

      const item = document.querySelector(`[data-stop-id="${stopId}"]`);

      if (btn) {
        btn.classList.add('loading');
        btn.textContent = 'Processing...';

      // Compress image first
      compressImage(file, statusDiv)
        .then((compressedBlob) => {
          // Now upload the compressed blob
          const formData = new FormData();
          formData.append('file', compressedBlob, file.name.replace(/\.[^.]+$/, '.jpg'));
          formData.append('stopId', stopId);
          formData.append('date', document.getElementById('datePicker').value);

          // Update status to show upload is starting
          if (statusDiv) {
            statusDiv.textContent = '📤 Uploading compressed image...';
          }

          fetch(API_BASE_URL + '/upload.php', {
            method: 'POST',
            body: formData
          })
          .then(r => r.json())
          .then(data => {
            if (data.success) {

              console.log('Image uploaded:', data.imageUrl);

              }
              syncToAirtable(stop);
              if (btn) {
                btn.classList.remove('loading');
                btn.textContent = '✓ Photo';
              }
              // Clear status after success
              if (statusDiv) {
                setTimeout(() => {
                  statusDiv.classList.remove('show');
                }, 2000);
              }
            } else {
              throw new Error(data.error || 'Upload failed');
            }
          })
          .catch(err => {
            console.error('Upload failed:', err);
            if (btn) {
              btn.classList.remove('loading');
              btn.textContent = '❌ Error';
              setTimeout(() => { btn.textContent = 'Upload'; }, 3000);
            }
            if (statusDiv) {
              statusDiv.textContent = '❌ Upload failed';
            }
          });
        })
        .catch(err => {
          console.error('Compression failed:', err);
          if (btn) {
            btn.classList.remove('loading');
            btn.textContent = '❌ Compression Error';
            setTimeout(() => { btn.textContent = 'Upload'; }, 3000);
          }
          if (statusDiv) {
            statusDiv.textContent = '❌ Compression failed';
          }
        });
    }

    // Fetch orders from Airtable and link to booking addresses
    async function loadOrdersForDate(dateStr) {
      try {
        console.log(`📥 Fetching orders for ${dateStr}...`);
        
        // Fetch orders filtered by Service Date
        const ordersUrl = `${AIRTABLE_URL}/${AIRTABLE_BASE_ID}/${ORDERS_TABLE_ID}`;
        const ordersResponse = await fetch(ordersUrl, {
          headers: {
            'Authorization': `Bearer ${AIRTABLE_API_KEY}`,
            'Content-Type': 'application/json'
          }
        });
        
        if (!ordersResponse.ok) {
          throw new Error(`Airtable orders fetch failed: ${ordersResponse.status}`);
        }
        
        const ordersData = await ordersResponse.json();
        const allOrders = ordersData.records || [];
        
        // Filter orders by date
        const ordersForDate = allOrders.filter(record => {
          const serviceDate = record.fields['Service Date'];
          return serviceDate === dateStr;
        });
        
        console.log(`✓ Found ${ordersForDate.length} orders for ${dateStr}`);
        
        // For each order, fetch its booking to get address & coordinates
        const stops = [];
        
        for (const orderRecord of ordersForDate) {
          const fields = orderRecord.fields;
          const bookingId = fields['Booking ID'];
          const serviceType = fields['Service Type'] || 'Roll Out';
          const status = fields['Status'] || 'Pending';
          const orderId = fields['Order ID'] || 'Unknown';
          
          if (!bookingId) {
            console.warn(`⚠️ Order ${orderId} missing Booking ID, skipping`);
            continue;
          }
          
          // Fetch the corresponding booking by searching for the Booking ID field
          try {
            // Use filterByFormula to find booking by Booking ID field value
            const bookingUrl = `${AIRTABLE_URL}/${AIRTABLE_BASE_ID}/${BOOKINGS_TABLE_ID}?filterByFormula=%7BBooking%20ID%7D%3D'${encodeURIComponent(bookingId)}'`;
            const bookingResponse = await fetch(bookingUrl, {
              headers: {
                'Authorization': `Bearer ${AIRTABLE_API_KEY}`,
                'Content-Type': 'application/json'
              }
            });
            
            if (!bookingResponse.ok) {
              console.warn(`⚠️ Could not fetch bookings for ${bookingId}`);
              continue;
            }
            
            const bookingListData = await bookingResponse.json();
            const bookingRecords = bookingListData.records || [];
            
            if (bookingRecords.length === 0) {
              console.warn(`⚠️ No booking found with ID ${bookingId} for order ${orderId}`);
              continue;
            }
            
            const bookingData = bookingRecords[0];
            const bookingFields = bookingData.fields || {};
            
            // Extract address and coordinates from booking
            const address = bookingFields['Address'] || 'Unknown Address';
            const lat = parseFloat(bookingFields['lat']) || 43.6629;
            const lng = parseFloat(bookingFields['lng']) || -79.3957;
            
            // Convert service type to our internal type (rollin/rollout)
            const type = serviceType.toLowerCase().includes('roll in') ? 'rollin' : 'rollout';
            const completed = status.toLowerCase().includes('completed');
            
            // Bin placement is stored as one JSON string in "Bin Placement" (prefer
            // the Order's copy, fall back to the Booking's).
            let binPlacement = null;
            const binBlob = fields['Bin Placement'] || bookingFields['Bin Placement'] || '';
            if (binBlob) {
              try { binPlacement = JSON.parse(binBlob); }
              catch (e) { console.warn('Bad Bin Placement JSON for order', orderId, e); }
            }

            // Create stop object
            const stop = {
              id: orderRecord.id,
              orderId: orderId,
              bookingId: bookingId,
              address: address,
              type: type,
              completed: completed,
              imageUrl: null,
              lat: lat,
              lng: lng,
              airtableOrderRecordId: orderRecord.id,
              // Bin placement (only set when the customer dropped a pin)
              binPano:       binPlacement?.pano || null,
              binLat:        binPlacement?.binLatLng?.lat ?? null,
              binLng:        binPlacement?.binLatLng?.lng ?? null,
              binPovHeading: binPlacement?.pov?.heading ?? null,
              binPovPitch:   binPlacement?.pov?.pitch ?? null,
              binPovZoom:    binPlacement?.pov?.zoom ?? null,
              hasBinPin:     !!binPlacement?.hasPin
            };
            
            stops.push(stop);
            console.log(`✓ Loaded: ${address} (${type}) - ${orderId}`);
            
          } catch (bookingError) {
            console.error(`❌ Error fetching booking ${bookingId}:`, bookingError);
          }
        }
        
        // Update currentStops and re-render
        if (stops.length > 0) {
          // Fetch service log to get image URLs for each stop
          try {
            const svcRes = await fetch('/api/services.php');
            const svcData = await svcRes.json();
            const serviceRecords = svcData.services || [];

            stops.forEach(stop => {
              // Find most recent completed record with an image for this stop
              const matches = serviceRecords.filter(s =>
                s.fields['Stop ID'] === stop.id && s.fields['Image URL']
              );
              if (matches.length > 0) {
                // Prefer completed records; fall back to any record with image
                const completed = matches.filter(s => s.fields['Completed']);
                const best = completed.length > 0 ? completed[completed.length - 1] : matches[matches.length - 1];
                const rawUrl = best.fields['Image URL'];
                stop.imageUrl = rawUrl.startsWith('http') ? rawUrl : 'https://agentrocketman.com' + rawUrl;
                console.log(`🖼️ Image loaded for ${stop.address}: ${stop.imageUrl}`);
              }
            });
          } catch (svcErr) {
            console.warn('⚠️ Could not fetch service images:', svcErr);
          }

          currentStops = stops;
          console.log(`🎯 Loaded ${stops.length} stops total`);
          if (driverLocation) {
            sortAndRender();
          }
        } else {
          console.warn('⚠️ No stops loaded for this date');
          currentStops = [];
          renderServiceList();
          renderMarkers([]);
        }
        
      } catch (error) {
        console.error('❌ Error loading orders from Airtable:', error);
        alert(`Error loading orders: ${error.message}`);
      }
    }

    // Set today's date and load orders
    function setTodayDate() {
      // Allow ?date=YYYY-MM-DD in the URL to override today (useful for debugging future bookings)
      const urlDate = new URLSearchParams(location.search).get('date');
      const today = (urlDate && /^\d{4}-\d{2}-\d{2}$/.test(urlDate))
        ? urlDate
        : new Date().toISOString().split('T')[0];
      document.getElementById('datePicker').value = today;
      
      // Load orders for today (or the override date) on init
      loadOrdersForDate(today);
      
      // Load orders when date picker changes
      document.getElementById('datePicker').addEventListener('change', (e) => {
        loadOrdersForDate(e.target.value);
      });
    }

    // Open directions modal


    // Check backend availability
    function checkBackendHealth() {
      fetch(API_BASE_URL + '/health.php')
        .then(r => r.json())
        .then(data => {
          if (data.status === 'ok') {
            console.log('✅ Backend API connected');
            window.BACKEND_READY = true;
          }
        })
        .catch(() => {
          console.warn('⚠️ Backend API not available - running in offline mode');
          window.BACKEND_READY = false;
        });
    }

    // Start — wait for Google Maps to be ready before init(), otherwise initMap()
    // throws on `new google.maps.Map(...)` and the rest of init() (date picker,
    // worker name, orders fetch) never runs.
    checkBackendHealth();
    (window.googleMapsReady || Promise.resolve()).then(() => init()).catch((e) => {
      console.error('init() failed:', e);
    });
  </script>

  <!-- Street View module for bin spot modal -->
  <script src="streetview.js"></script>
  <script>
    // ===== Bin Spot Modal & per-stop SV thumbnails =====
    let binSpotPanorama = null;
    let binSpotMarker = null;
    const stopThumbPanos = new Map();   // thumbId -> panorama instance
    let _thumbObserver = null;

    async function ensureMapsApi() {
      if (window.google && window.google.maps) return;
      await window.streetView.init();
      let attempts = 0;
      while (!window.google || !window.google.maps) {
        await new Promise(r => setTimeout(r, 100));
        if (++attempts > 50) throw new Error('Maps API not loaded');
      }
    }

    // Mount the saved Street View pose as a tiny non-interactive panorama inside
    // the thumbnail container. Uses IntersectionObserver so we only spin up
    // panoramas for stops actually scrolled into view.
    function mountStopThumb(stop, thumbId) {
      if (!stop.binPano && !(stop.lat && stop.lng)) return;
      if (!_thumbObserver) {
        _thumbObserver = new IntersectionObserver((entries) => {
          for (const e of entries) {
            if (!e.isIntersecting) continue;
            const el = e.target;
            _thumbObserver.unobserve(el);
            const data = el._stopData;
            if (data) renderStopThumb(data, el);
          }
        }, { rootMargin: '200px' });
      }
      requestAnimationFrame(() => {
        const el = document.getElementById(thumbId);
        if (!el) return;
        el._stopData = stop;
        _thumbObserver.observe(el);
      });
    }

    async function renderStopThumb(stop, el) {
      try { await ensureMapsApi(); } catch (e) { return; }
      const opts = {
        pov: { heading: stop.binPovHeading ?? 0, pitch: stop.binPovPitch ?? 0 },
        zoom: 0,
        disableDefaultUI: true,
        clickToGo: false, linksControl: false, panControl: false, zoomControl: false,
        addressControl: false, fullscreenControl: false,
        motionTracking: false, motionTrackingControl: false,
        showRoadLabels: false, scrollwheel: false
      };
      if (stop.binPano) opts.pano = stop.binPano;
      else opts.position = { lat: stop.lat, lng: stop.lng };
      const p = new google.maps.StreetViewPanorama(el, opts);
      stopThumbPanos.set(el.id, p);
      // Block thumbnail interactions so the click bubbles up to the wrapper.
      const shield = document.createElement('div');
      shield.style.cssText = 'position:absolute;inset:0;cursor:pointer;z-index:6;background:transparent;';
      el.appendChild(shield);
    }

    async function openBinSpotModal(stop) {
      const modal = document.getElementById('binSpotModal');
      const addrEl = document.getElementById('binSpotAddress');
      addrEl.textContent = stop.address || '';
      modal.classList.add('show');

      try {
        await window.streetView.init();
        let attempts = 0;
        while (!window.google || !window.google.maps) {
          await new Promise(r => setTimeout(r, 100));
          if (++attempts > 50) throw new Error('Maps API not loaded');
        }
        renderBinSpot(stop);
      } catch (e) {
        console.error('Failed to open bin spot modal:', e);
      }
    }

    function renderBinSpot(stop) {
      const container = document.getElementById('binSpotStreetView');
      const binLatLng = new google.maps.LatLng(stop.binLat, stop.binLng);
      const pov = {
        heading: stop.binPovHeading ?? 0,
        pitch:   stop.binPovPitch   ?? 0
      };
      const zoom = stop.binPovZoom ?? 0;

      // Mount the panorama at the customer's saved pano/POV
      binSpotPanorama = new google.maps.StreetViewPanorama(container, {
        pano: stop.binPano,
        pov: pov,
        zoom: zoom,
        streetViewControl: false,
        panControl: false,
        zoomControl: true,
        fullscreenControl: true,
        addressControl: false,
        clickToGo: true,
        linksControl: true,
        motionTracking: false,
        motionTrackingControl: false
      });

      // Inverted teardrop pin in brand green. Uses only solid fills + simple shapes
      // because Google Maps Marker icons rendered from data: URLs are picky about
      // SVG gradients and filters (they often render blank). Tip sits at the saved
      // ground location; the marker is anchored to a real world LatLng so it stays
      // locked when the driver pans, walks, or rotates the panorama.
      const binIcon = {
        url: 'data:image/svg+xml;utf8,' + encodeURIComponent(
          "<svg xmlns='http://www.w3.org/2000/svg' width='56' height='76' viewBox='0 0 56 76'>" +
            "<path d='M28 4 C 14 4, 4 14, 4 28 C 4 42, 28 70, 28 70 C 28 70, 52 42, 52 28 C 52 14, 42 4, 28 4 Z' fill='#71b80c' stroke='white' stroke-width='3' stroke-linejoin='round'/>" +
            "<circle cx='28' cy='26' r='8' fill='white'/>" +
            "<circle cx='28' cy='26' r='4.5' fill='#5a9109'/>" +
          "</svg>"
        ),
        scaledSize: new google.maps.Size(56, 76),
        // Anchor at the icon's CENTER (not the tip). Street View clips Markers
        // whose anchor projects below the camera horizon, which made the marker
        // disappear when the driver was at/near the saved spot. Centering the
        // anchor floats the pin at eye-level so it stays visible from any nearby
        // vantage point. The visual "tip" still points at the right ground spot.
        anchor: new google.maps.Point(28, 38)
      };
      binSpotMarker = new google.maps.Marker({
        position: binLatLng,
        map: binSpotPanorama,
        icon: binIcon,
        draggable: false,
        title: 'Customer\'s requested bin spot',
        zIndex: 1000,
        optimized: false   // Force the marker to render via DOM, avoiding canvas-batch clipping
      });
    }

    function closeBinSpotModal() {
      const modal = document.getElementById('binSpotModal');
      modal.classList.remove('show');
      // Clean up to free memory
      if (binSpotMarker) { binSpotMarker.setMap(null); binSpotMarker = null; }
      if (binSpotPanorama) {
        document.getElementById('binSpotStreetView').innerHTML = '';
        binSpotPanorama = null;
      }
    }

    // Bind close interactions
    document.querySelector('.bin-spot-close').addEventListener('click', closeBinSpotModal);
    document.getElementById('binSpotModal').addEventListener('click', (e) => {
      if (e.target.id === 'binSpotModal') closeBinSpotModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('binSpotModal').classList.contains('show')) closeBinSpotModal();
    });
  </script>
