<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CurbIn Assistant" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2322c55e'/%3E%3Cpath d='M50 35c-8 0-14 6-14 14v12a14 14 0 1 0 28 0V49c0-8-6-14-14-14zm-4 33a4 4 0 1 1 8 0 4 4 0 0 1-8 0z' fill='%23fff'/%3E%3C/svg%3E" />
  <title>CurbIn Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>CurbIn Assistant</h1>
      <p class="subtitle">Voice message me. I'll reply when I can.</p>
    </header>

    <main>
      <div id="status" class="status">Tap and hold the mic to talk</div>

      <div class="mic-wrap">
        <button id="micBtn" class="mic-button" aria-label="Hold to record">
          <svg id="micIcon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>
        <div id="recordingRing" class="recording-ring"></div>
      </div>

      <div id="messages" class="messages"></div>
    </main>

    <footer>
      <p>Built for Chris · agentrocketman.com</p>
    </footer>
  </div>

  <audio id="player" preload="none"></audio>
  <script src="app.js"></script>
</body>
</html>
