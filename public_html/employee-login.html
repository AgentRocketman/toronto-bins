<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Login — CurbIn</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--teal:#0d9488;--teal-dark:#0f766e;--teal-xlight:#f0fdf9;--slate:#334155;--slate-light:#64748b}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#0a5c56 0%,#0d9488 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
    .login-card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:2.5rem 2rem;width:100%;max-width:420px}
    .login-logo{text-align:center;margin-bottom:1.8rem}
    .login-logo img{height:40px}
    .login-title{font-size:1.3rem;font-weight:900;color:#0f172a;text-align:center;margin-bottom:.3rem}
    .login-sub{font-size:.88rem;color:var(--slate-light);text-align:center;margin-bottom:1.8rem}
    .field{margin-bottom:1rem}
    .field label{display:block;font-size:.82rem;font-weight:700;color:var(--slate);margin-bottom:.35rem}
    .field input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.95rem;color:#0f172a;transition:border .2s}
    .field input:focus{outline:none;border-color:var(--teal)}
    .btn{display:block;width:100%;padding:13px;border-radius:12px;font-size:1rem;font-weight:800;border:none;cursor:pointer;transition:all .15s;text-align:center;margin-top:1.2rem}
    .btn-primary{background:var(--teal);color:#fff}
    .btn-primary:hover{background:var(--teal-dark)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed}
    .forgot-link{text-align:center;margin-top:1rem;font-size:.85rem}
    .forgot-link a{color:var(--teal);text-decoration:none;font-weight:600}
    .error-msg{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;font-size:.85rem;padding:10px 14px;border-radius:8px;margin-top:.8rem;display:none}
    .spinner{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo"><img src="logo.jpg" alt="CurbIn"></div>
  <div class="login-title">Employee Portal</div>
  <div class="login-sub">Sign in to access your service routing</div>

  <div class="field">
    <label>Email address</label>
    <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <div class="error-msg" id="error-msg"></div>
  <button class="btn btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
  <div class="forgot-link"><a href="/forgot-password.html">Forgot your password?</a></div>
</div>

<script>
  // Redirect if already logged in
  const token = localStorage.getItem('curbin_emp_token');
  if (token) {
    fetch('/api/auth/verify.php', { headers: { 'Authorization': 'Bearer ' + token } })
      .then(r => r.json()).then(d => { if (d.valid) window.location.href = '/service-routing.html'; });
  }

  async function doLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err      = document.getElementById('error-msg');
    const btn      = document.getElementById('login-btn');
    err.style.display = 'none';
    if (!email || !password) { err.textContent = 'Please enter your email and password.'; err.style.display = 'block'; return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';
    try {
      const res  = await fetch('/api/auth/login.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
      const data = await res.json();
      if (!data.success) { err.textContent = data.error || 'Login failed.'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; return; }
      localStorage.setItem('curbin_emp_token', data.token);
      localStorage.setItem('curbin_emp_name', data.firstName);
      window.location.href = '/service-routing.html';
    } catch(e) {
      err.textContent = 'Network error. Please try again.'; err.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
