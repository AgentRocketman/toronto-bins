<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — GetMyBin</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{#71b80c:#0d9488;#71b80c-dark:#0f766e;--slate:#334155;--slate-light:#64748b}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#0a5c56 0%,#0d9488 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
    .card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:2.5rem 2rem;width:100%;max-width:420px}
    .logo{text-align:center;margin-bottom:1.8rem}
    .logo img{height:40px}
    h1{font-size:1.3rem;font-weight:900;color:#0f172a;text-align:center;margin-bottom:.3rem}
    .sub{font-size:.88rem;color:var(--slate-light);text-align:center;margin-bottom:1.8rem;line-height:1.6}
    .field{margin-bottom:1rem}
    .field label{display:block;font-size:.82rem;font-weight:700;color:var(--slate);margin-bottom:.35rem}
    .field input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.95rem;color:#0f172a;transition:border .2s}
    .field input:focus{outline:none;border-color:var(#71b80c)}
    .btn{display:block;width:100%;padding:13px;border-radius:12px;font-size:1rem;font-weight:800;border:none;cursor:pointer;background:var(#71b80c);color:#fff;margin-top:1.2rem}
    .btn:hover{background:var(#71b80c-dark)}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .back-link{text-align:center;margin-top:1rem;font-size:.85rem}
    .back-link a{color:var(#71b80c);text-decoration:none;font-weight:600}
    .success{background:#f0fdf4;border:1px solid #86efac;color:#166534;font-size:.9rem;padding:14px;border-radius:10px;margin-top:.8rem;line-height:1.6;display:none}
    .spinner{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="logo.jpg" alt="GetMyBin"></div>
  <h1>Forgot Password</h1>
  <p class="sub">Enter your email and we'll send you a link to reset your password.</p>
  <div id="form-wrap">
    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
    <button class="btn" id="submit-btn" onclick="doReset()">Send Reset Link</button>
  </div>
  <div class="success" id="success">✅ If that email is registered, you'll receive a reset link shortly. Check your inbox.</div>
  <div class="back-link"><a href="/employee-login.html">← Back to login</a></div>
</div>
<script>
  async function doReset() {
    const email = document.getElementById('email').value.trim();
    const btn   = document.getElementById('submit-btn');
    if (!email) return;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Sending…';
    await fetch('/api/auth/forgot-password.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email}) });
    document.getElementById('form-wrap').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
</script>
</body>
</html>
