<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OpenClaw Chat" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f172a'/%3E%3Cpath d='M20 30h60v40H55l-15 12v-12H20z' fill='%2322c55e'/%3E%3C/svg%3E" />
  <title>OpenClaw Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="title-row">
        <div class="avatar">🤖</div>
        <div>
          <h1>OpenClaw</h1>
          <div class="status" id="status">Ready</div>
        </div>
      </div>
      <button id="clearBtn" class="clear-btn" title="Clear chat">Clear</button>
    </header>

    <main id="messages" class="messages" aria-live="polite"></main>

    <form id="composer" class="composer" autocomplete="off">
      <textarea
        id="input"
        placeholder="Message OpenClaw…"
        rows="1"
        maxlength="4000"
        aria-label="Message"
      ></textarea>
      <button id="micBtn" type="button" class="mic-btn" aria-label="Hold to record voice" title="Hold to record voice">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
      <button id="sendBtn" type="submit" aria-label="Send">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
          <path d="M3.4 20.4l17.45-8.3a1.2 1.2 0 0 0 0-2.2L3.4 3.6a1.2 1.2 0 0 0-1.66 1.44L4.5 11 2 18.96a1.2 1.2 0 0 0 1.4 1.44z"/>
        </svg>
      </button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
