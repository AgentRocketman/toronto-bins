<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GetMyBin Admin Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #71b80c, #5a9409);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header h1 {
      font-size: 2rem;
      color: #0f766e;
      margin-bottom: 8px;
    }

    .login-header p {
      color: #64748b;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: #71b80c;
      box-shadow: 0 0 0 3px rgba(113, 184, 12, 0.1);
    }

    .login-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #71b80c, #5a9409);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(113, 184, 12, 0.3);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .login-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      color: #dc2626;
      font-size: 0.9rem;
      margin-top: 12px;
      padding: 10px;
      background: #fee2e2;
      border-radius: 6px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: #059669;
      font-size: 0.9rem;
      margin-top: 12px;
      padding: 10px;
      background: #d1fae5;
      border-radius: 6px;
      display: none;
    }

    .success-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🚀 GetMyBin</h1>
      <p>Admin Panel</p>
    </div>

    <form id="adminLoginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="login-button" id="loginBtn">Sign In</button>

      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById('adminLoginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMessage');
    const successMsg = document.getElementById('successMessage');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      try {
        const response = await fetch('/api/admin-auth/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }

        successMsg.textContent = 'Login successful! Redirecting...';
        successMsg.classList.add('show');

        localStorage.setItem('adminToken', data.token);
        localStorage.setItem('adminEmail', email);

        setTimeout(() => {
          window.location.href = '/admin-panel.html';
        }, 1000);
      } catch (err) {
        console.error('Login error:', err);
        errorMsg.textContent = err.message;
        errorMsg.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });

    // Check if already logged in
    window.addEventListener('load', () => {
      const token = localStorage.getItem('adminToken');
      if (token) {
        window.location.href = '/admin-panel.html';
      }
    });
  </script>
</body>
</html>
