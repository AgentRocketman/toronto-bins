<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>CurbIn Voice Assistant</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #22c55e;
      --accent-glow: rgba(34, 197, 94, 0.4);
      --danger: #ef4444;
      --radius: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overscroll-behavior: none;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(12px + var(--safe-top)) 16px 12px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 10;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #16a34a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .brand-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .brand-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: -2px;
    }
    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 0;
      background: var(--panel);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .icon-btn:active { transform: scale(0.95); }
    .icon-btn.active { background: var(--accent); color: #fff; }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .message {
      max-width: 82%;
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.45;
      word-wrap: break-word;
      animation: popIn 0.2s ease-out;
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      align-self: flex-end;
      background: var(--accent);
      color: #052e16;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start;
      background: var(--panel);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .status {
      align-self: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(30, 41, 59, 0.8);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .status.show { opacity: 1; }
    .dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }

    .input-area {
      padding: 12px 16px calc(12px + var(--safe-bottom));
      background: var(--panel);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .text-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .text-row input {
      flex: 1;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }
    .text-row input::placeholder { color: var(--text-muted); }
    .mic-row {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .mic-button {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 0;
      background: linear-gradient(135deg, var(--accent), #16a34a);
      color: #052e16;
      font-size: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(34, 197, 94, 0.35);
      transition: transform 0.1s, box-shadow 0.2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    .mic-button:active { transform: scale(0.94); }
    .mic-button.listening {
      animation: glow 1.2s infinite alternate, scalePulse 1.2s infinite alternate;
      box-shadow: 0 0 40px var(--accent-glow);
    }
    @keyframes glow {
      from { box-shadow: 0 0 20px var(--accent-glow); }
      to { box-shadow: 0 0 55px var(--accent-glow); }
    }
    @keyframes scalePulse {
      from { transform: scale(1); }
      to { transform: scale(1.06); }
    }
    .mic-hint {
      position: absolute;
      bottom: -24px;
      left: 0;
      right: 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }
    .hint { color: var(--text-muted); font-size: 12px; text-align: center; margin-top: 10px; }

    .error-toast {
      position: fixed;
      top: calc(10px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%) translateY(-60px);
      background: var(--danger);
      color: #fff;
      padding: 10px 16px;
      border-radius: 24px;
      font-size: 13px;
      z-index: 100;
      transition: transform 0.3s ease-out;
    }
    .error-toast.show { transform: translateX(-50%) translateY(0); }

    @media (min-width: 900px) {
      .chat { padding: 24px; }
      .app { border-left: 1px solid rgba(255,255,255,0.06); border-right: 1px solid rgba(255,255,255,0.06); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="brand-icon">🎙</div>
        <div>
          <div class="brand-title">CurbIn Voice</div>
          <div class="brand-subtitle">Talk to your assistant</div>
        </div>
      </div>
      <button id="muteBtn" class="icon-btn" title="Toggle voice output">🔊</button>
    </header>

    <div id="chat" class="chat">
      <div class="message assistant">Hey Chris — tap and hold the mic to speak, or type below.</div>
    </div>

    <div id="status" class="status"><span class="dot"></span><span id="statusText">Listening…</span></div>

    <div class="error-toast" id="errorToast"></div>

    <div class="input-area">
      <div class="text-row">
        <input id="textInput" type="text" placeholder="Type a message…" autocomplete="off" />
        <button id="sendBtn" class="icon-btn">➤</button>
      </div>
      <div class="mic-row">
        <button id="micBtn" class="mic-button" title="Hold to speak">🎤</button>
        <div class="mic-hint" id="micHint">Tap & hold to talk</div>
      </div>
      <div class="hint">Voice works best in Chrome, Safari, or Edge.</div>
    </div>
  </div>

  <script>
    (function() {
      // Session + history
      const SESSION_KEY = 'curbin_voice_session';
      const HISTORY_KEY = 'curbin_voice_history';

      function getSessionId() {
        let id = localStorage.getItem(SESSION_KEY);
        if (!id) {
          id = 'sess_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
          localStorage.setItem(SESSION_KEY, id);
        }
        return id;
      }

      function getHistory() {
        try {
          const raw = localStorage.getItem(HISTORY_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch { return []; }
      }

      function saveHistory(history) {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(-40)));
      }

      const sessionId = getSessionId();
      const TTS_VOICE_KEY = 'curbin_voice_tts_voice';
      const state = {
        listening: false,
        muted: false,
        processing: false,
        recognition: null,
        ttsVoice: localStorage.getItem(TTS_VOICE_KEY) || 'alloy',
        currentAudio: null,
      };

      const chatEl = document.getElementById('chat');
      const micBtn = document.getElementById('micBtn');
      const micHint = document.getElementById('micHint');
      const statusEl = document.getElementById('status');
      const statusText = document.getElementById('statusText');
      const textInput = document.getElementById('textInput');
      const sendBtn = document.getElementById('sendBtn');
      const muteBtn = document.getElementById('muteBtn');
      const errorToast = document.getElementById('errorToast');

      // Speech recognition setup
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        micBtn.disabled = true;
        micHint.textContent = 'Voice not supported in this browser';
        showError('Speech recognition is not supported. Use the text box.');
      }

      // Microphone state
      let recognitionSession = {
        rec: null,
        transcripts: [],
        hasInterim: false,
        sending: false
      };

      function getHeardText() {
        return recognitionSession.transcripts.join(' ').trim();
      }

      function flushTranscript() {
        const message = getHeardText();
        recognitionSession.transcripts = [];
        recognitionSession.hasInterim = false;
        return message;
      }

      function finishListening() {
        const message = flushTranscript();
        if (message) {
          addMessage('user', message);
          sendToAssistant(message);
        } else if (recognitionSession.hasInterim) {
          // We heard something but it never finalized. Try next time.
          recognitionSession.hasInterim = false;
        }
      }

      function startListening() {
        if (!SpeechRecognition || state.processing || state.listening) return;

        // Fresh recognition instance each session (iOS Safari is much happier this way)
        if (recognitionSession.rec) {
          try { recognitionSession.rec.stop(); } catch {}
        }
        recognitionSession = { rec: null, transcripts: [], hasInterim: false, sending: false };

        const rec = new SpeechRecognition();
        rec.continuous = true;
        rec.interimResults = true;
        rec.lang = 'en-US';
        recognitionSession.rec = rec;

        rec.onstart = () => {
          state.listening = true;
          micBtn.classList.add('listening');
          micHint.textContent = 'Listening…';
          statusText.textContent = 'Listening…';
          statusEl.classList.add('show');
        };

        rec.onend = () => {
          state.listening = false;
          micBtn.classList.remove('listening');
          micHint.textContent = 'Tap & hold to talk';
          statusEl.classList.remove('show');
          finishListening();
        };

        rec.onresult = (event) => {
          let interim = '';
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
              recognitionSession.transcripts.push(transcript);
            } else {
              interim += transcript;
            }
          }
          recognitionSession.hasInterim = recognitionSession.hasInterim || interim.length > 0;
          if (interim) {
            statusText.textContent = 'Hearing: ' + interim;
          } else {
            statusText.textContent = 'Listening…';
          }
        };

        rec.onerror = (event) => {
          if (event.error === 'aborted') return;
          state.listening = false;
          micBtn.classList.remove('listening');
          micHint.textContent = 'Tap & hold to talk';
          statusEl.classList.remove('show');

          let msg = 'Voice input error: ' + event.error;
          if (event.error === 'not-allowed') msg = 'Microphone access denied. Check browser permissions.';
          if (event.error === 'no-speech') msg = 'No speech heard. Try again.';
          if (event.error === 'network') msg = 'Network error with speech recognition.';
          showError(msg);
        };

        try {
          rec.start();
        } catch (err) {
          recognitionSession.rec = null;
          showError('Could not start microphone. ' + err.message);
        }
      }

      function stopListening() {
        if (recognitionSession.rec) {
          try { recognitionSession.rec.stop(); } catch {}
        }
      }

      function clearListeningState() {
        state.listening = false;
        micBtn.classList.remove('listening');
        micHint.textContent = 'Tap & hold to talk';
        statusEl.classList.remove('show');
      }

      // Mic button interactions (tap or hold). Pointer events cover mouse + touch.
      // Capturing the pointer means releasing outside the button still works.
      micBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        try { micBtn.setPointerCapture(e.pointerId); } catch {}
        startListening();
      });
      micBtn.addEventListener('pointerup', (e) => {
        try { micBtn.releasePointerCapture(e.pointerId); } catch {}
        stopListening();
        // If onend already fired, finishListening has run. If not, force it after a short wait.
        setTimeout(() => {
          if (!state.listening) finishListening();
        }, 200);
      });
      micBtn.addEventListener('pointercancel', () => {
        stopListening();
        clearListeningState();
      });

      // Text input
      function submitText() {
        const val = textInput.value.trim();
        if (!val || state.processing) return;
        textInput.value = '';
        addMessage('user', val);
        sendToAssistant(val);
      }
      sendBtn.addEventListener('click', submitText);
      textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitText(); });

      // Mute toggle
      function applyMuted() {
        muteBtn.textContent = state.muted ? '🔇' : '🔊';
        muteBtn.classList.toggle('active', state.muted);
      }
      muteBtn.addEventListener('click', () => {
        state.muted = !state.muted;
        if (state.muted) stopAudio();
        applyMuted();
      });
      applyMuted();

      function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = 'message ' + role;
        div.textContent = text;
        chatEl.appendChild(div);
        chatEl.scrollTop = chatEl.scrollHeight;
        return div;
      }

      function showError(msg) {
        errorToast.textContent = msg;
        errorToast.classList.add('show');
        setTimeout(() => errorToast.classList.remove('show'), 4000);
      }

      async function sendToAssistant(message) {
        if (state.processing) return;
        state.processing = true;
        statusText.textContent = 'Thinking…';
        statusEl.classList.add('show');

        const history = getHistory();

        try {
          const res = await fetch('./api/ask.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message, sessionId, history })
          });

          let data;
          try { data = await res.json(); } catch { data = {}; }

          if (!res.ok || data.error) {
            throw new Error(data.error || 'Server error (' + res.status + ')');
          }

          const reply = data.response || '(No response)';
          addMessage('assistant', reply);

          history.push({ role: 'user', content: message });
          history.push({ role: 'assistant', content: reply });
          saveHistory(history);

          if (!state.muted) fetchTTSAndPlay(reply);
        } catch (err) {
          showError(err.message || 'Failed to get a response.');
        } finally {
          state.processing = false;
          statusEl.classList.remove('show');
        }
      }

      // TTS via OpenAI (with browser TTS fallback)
      function stopAudio() {
        if (state.currentAudio) {
          state.currentAudio.pause();
          state.currentAudio = null;
        }
        if (window.speechSynthesis) window.speechSynthesis.cancel();
      }

      async function fetchTTSAndPlay(text) {
        if (state.muted || !text) return;
        stopAudio();

        statusText.textContent = 'Reading response…';
        statusEl.classList.add('show');

        try {
          const res = await fetch('./api/tts.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, voice: state.ttsVoice })
          });

          let data;
          try { data = await res.json(); } catch { data = {}; }

          if (!res.ok || data.error || !data.audio) {
            throw new Error(data.error || 'TTS unavailable');
          }

          await playBase64Audio(data.audio);
        } catch (err) {
          console.warn('OpenAI TTS failed, falling back to browser TTS:', err);
          browserTTS(text);
        } finally {
          statusEl.classList.remove('show');
        }
      }

      function playBase64Audio(base64) {
        return new Promise((resolve, reject) => {
          const audio = new Audio('data:audio/mp3;base64,' + base64);
          state.currentAudio = audio;
          audio.onended = () => { state.currentAudio = null; resolve(); };
          audio.onerror = () => { state.currentAudio = null; reject(new Error('Audio playback failed')); };
          audio.play().catch((err) => { state.currentAudio = null; reject(err); });
        });
      }

      function browserTTS(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'en-US';
        utter.rate = 1.05;
        utter.pitch = 1.0;
        const voices = window.speechSynthesis.getVoices();
        const preferred = voices.find(v => v.name.includes('Samantha'))
          || voices.find(v => v.name.includes('Google US English'))
          || voices.find(v => v.lang === 'en-US')
          || voices[0];
        if (preferred) utter.voice = preferred;
        window.speechSynthesis.speak(utter);
      }

      // Keyboard shortcut: focus text input
      document.addEventListener('keydown', (e) => {
        if (e.key === '/' && document.activeElement !== textInput) {
          e.preventDefault();
          textInput.focus();
        }
      });
    })();
  </script>
</body>
</html>
