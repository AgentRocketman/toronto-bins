<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — CurbIn</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--teal:#0d9488;--teal-dark:#0f766e;--slate:#334155;--slate-light:#64748b}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#0a5c56 0%,#0d9488 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
    .card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:2.5rem 2rem;width:100%;max-width:420px}
    .logo{text-align:center;margin-bottom:1.8rem}
    .logo img{height:40px}
    h1{font-size:1.3rem;font-weight:900;color:#0f172a;text-align:center;margin-bottom:.3rem}
    .sub{font-size:.88rem;color:var(--slate-light);text-align:center;margin-bottom:1.8rem}
    .field{margin-bottom:1rem}
    .field label{display:block;font-size:.82rem;font-weight:700;color:var(--slate);margin-bottom:.35rem}
    .field input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.95rem;color:#0f172a;transition:border .2s}
    .field input:focus{outline:none;border-color:var(--teal)}
    .btn{display:block;width:100%;padding:13px;border-radius:12px;font-size:1rem;font-weight:800;border:none;cursor:pointer;background:var(--teal);color:#fff;margin-top:1.2rem}
    .btn:hover{background:var(--teal-dark)}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .error{background:#fef2f2;border:1px solid #fca5a5;color:#dc2626;font-size:.85rem;padding:10px 14px;border-radius:8px;margin-top:.8rem;display:none}
    .success{text-align:center;display:none}
    .success-icon{font-size:3rem;margin-bottom:.8rem}
    .spinner{display:inline-block;width:16px;height:16px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    a{color:var(--teal);font-weight:600;text-decoration:none}
  </style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="logo.jpg" alt="CurbIn"></div>
  <div id="form-wrap">
    <h1>Set New Password</h1>
    <p class="sub">Choose a strong password — at least 8 characters.</p>
    <div class="field">
      <label>New password</label>
      <input type="password" id="password" placeholder="Min. 8 characters">
    </div>
    <div class="field">
      <label>Confirm new password</label>
      <input type="password" id="confirm" placeholder="Repeat password">
    </div>
    <div class="error" id="error"></div>
    <button class="btn" id="submit-btn" onclick="doReset()">Set New Password</button>
  </div>
  <div class="success" id="success">
    <div class="success-icon">✅</div>
    <strong style="color:#0f172a;font-size:1.1rem">Password updated!</strong>
    <p style="color:var(--slate-light);margin-top:.5rem;font-size:.9rem">You can now sign in with your new password.</p>
    <a href="/employee-login.html" style="display:inline-block;margin-top:1.2rem">Go to login →</a>
  </div>
</div>
<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) { document.getElementById('error').textContent = 'Invalid reset link.'; document.getElementById('error').style.display = 'block'; document.getElementById('form-wrap').style.opacity = '.4'; document.getElementById('submit-btn').disabled = true; }

  async function doReset() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const err      = document.getElementById('error');
    const btn      = document.getElementById('submit-btn');
    err.style.display = 'none';
    if (password.length < 8) { err.textContent = 'Password must be at least 8 characters.'; err.style.display = 'block'; return; }
    if (password !== confirm) { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Updating…';
    const res  = await fetch('/api/auth/reset-password.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({token, password}) });
    const data = await res.json();
    if (!data.success) { err.textContent = data.error || 'Reset failed. Please request a new link.'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Set New Password'; return; }
    document.getElementById('form-wrap').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  }
</script>
</body>
</html>
