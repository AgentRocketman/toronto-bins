<!DOCTYPE html>
<html>
<head>
  <title>Street View Test</title>
</head>
<body>
  <h1>Street View Test Page</h1>
  <p>Container below should show Street View of 100 King St W, Toronto:</p>
  <div id="streetview-container" style="width: 100%; height: 500px; border: 2px solid red; background: #eee;">
    <p style="padding: 20px;">Waiting for Street View to load...</p>
  </div>
  <div id="status" style="margin-top: 20px; padding: 10px; background: #f5f5f5; font-family: monospace; white-space: pre-wrap;"></div>

  <script src="/streetview.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    function log(msg) {
      console.log(msg);
      statusEl.textContent += msg + '\n';
    }

    // Capture console.log/warn/error
    ['log', 'warn', 'error'].forEach(level => {
      const original = console[level];
      console[level] = function(...args) {
        statusEl.textContent += '[' + level + '] ' + args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ') + '\n';
        original.apply(console, args);
      };
    });

    window.addEventListener('load', async () => {
      log('Page loaded');
      log('window.streetView exists: ' + (typeof window.streetView !== 'undefined'));
      log('Container exists: ' + !!document.getElementById('streetview-container'));

      if (typeof window.streetView === 'undefined') {
        log('ERROR: streetview.js module not loaded');
        return;
      }

      log('Calling streetView.display() with "100 King St W, Toronto"...');
      try {
        await window.streetView.display('100 King St W, Toronto', 'streetview-container');
      } catch (e) {
        log('ERROR: ' + e.message);
      }
    });
  </script>
</body>
</html>
