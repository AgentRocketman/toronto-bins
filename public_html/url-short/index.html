<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <div class="top-center-text">qqqq</div>
        <header>
            <h1>URL Shortener</h1>
            <p class="subtitle">Transform long URLs into short, shareable links</p>
        </header>

        <main>
            <form id="shortenForm" class="shorten-form">
                <div class="form-group">
                    <label for="urlInput">Enter your long URL:</label>
                    <input
                        type="url"
                        id="urlInput"
                        name="url"
                        placeholder="https://example.com/very/long/url"
                        required
                        autocomplete="url"
                    >
                </div>

                <div class="form-group" id="customAliasGroup">
                    <label for="customAlias">
                        Custom alias (optional):
                        <span class="help-text">3-10 alphanumeric characters</span>
                    </label>
                    <input
                        type="text"
                        id="customAlias"
                        name="customAlias"
                        placeholder="mylink"
                        pattern="[a-zA-Z0-9]{3,10}"
                        maxlength="10"
                    >
                </div>

                <button type="submit" id="shortenBtn" class="btn btn-primary">
                    Shorten URL
                </button>
            </form>

            <div id="result" class="result hidden">
                <div class="result-content">
                    <h2>Your shortened URL:</h2>
                    <div class="short-url-container">
                        <input
                            type="text"
                            id="shortUrlDisplay"
                            class="short-url-input"
                            readonly
                        >
                        <button id="copyBtn" class="btn btn-secondary">
                            Copy
                        </button>
                    </div>

                    <div id="qrCodeContainer" class="qr-code-container hidden">
                        <h3>QR Code:</h3>
                        <img id="qrCodeImage" alt="QR Code" class="qr-code">
                    </div>

                    <button id="shortenAnotherBtn" class="btn btn-link">
                        Shorten another URL
                    </button>
                </div>
            </div>

            <div id="error" class="error-message hidden">
                <p id="errorText"></p>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Generating short URL...</p>
            </div>
        </main>

        <footer>
            <nav>
                <a href="analytics.html">View Analytics</a>
            </nav>
        </footer>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
