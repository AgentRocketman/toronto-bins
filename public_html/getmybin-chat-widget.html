<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetMyBin Chat Support</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Sticky Chat Icon */
        .getmybin-chat-icon {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #71b80c 0%, #5a9409 100%);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(113, 184, 12, 0.3);
            z-index: 9999;
            transition: all 0.3s ease;
            border: none;
            font-size: 28px;
        }

        .getmybin-chat-icon:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(113, 184, 12, 0.4);
        }

        .getmybin-chat-icon:active {
            transform: scale(0.95);
        }

        /* Modal Overlay */
        .getmybin-chat-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 9998;
            animation: fadeIn 0.2s ease;
        }

        .getmybin-chat-overlay.active {
            display: block;
        }

        /* Chat Modal Window */
        .getmybin-chat-modal {
            position: fixed;
            bottom: 100px;
            right: 24px;
            width: 400px;
            max-width: calc(100vw - 32px);
            height: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 40px rgba(0, 0, 0, 0.16);
            display: flex;
            flex-direction: column;
            z-index: 9999;
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .getmybin-chat-modal.active {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        @media (max-width: 768px) {
            .getmybin-chat-modal {
                width: 100vw;
                height: 100vh;
                max-width: 100vw;
                bottom: 0;
                right: 0;
                border-radius: 0;
            }

            .getmybin-chat-icon {
                bottom: 20px;
                right: 20px;
                width: 56px;
                height: 56px;
                font-size: 24px;
            }
        }

        /* Chat Header */
        .getmybin-chat-header {
            background: linear-gradient(135deg, #71b80c 0%, #5a9409 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .getmybin-chat-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .getmybin-chat-header p {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 4px;
        }

        .getmybin-chat-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .getmybin-chat-close:hover {
            transform: rotate(90deg);
        }

        /* Messages Container */
        .getmybin-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Message Bubbles */
        .getmybin-chat-message {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .getmybin-chat-message.user {
            justify-content: flex-end;
        }

        .getmybin-chat-message.assistant {
            justify-content: flex-start;
        }

        .getmybin-chat-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 14px;
        }

        .getmybin-chat-message.user .getmybin-chat-bubble {
            background: #f0f0f0;
            color: #333;
            border-bottom-right-radius: 4px;
        }

        .getmybin-chat-message.assistant .getmybin-chat-bubble {
            background: #e8f5e0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        /* Typing Indicator */
        .getmybin-chat-typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .getmybin-chat-typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #71b80c;
            animation: typing 1.4s infinite;
        }

        .getmybin-chat-typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .getmybin-chat-typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-8px);
            }
        }

        /* Input Section */
        .getmybin-chat-input-area {
            border-top: 1px solid #e0e0e0;
            padding: 12px;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .getmybin-chat-input {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            padding: 10px 16px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .getmybin-chat-input:focus {
            border-color: #71b80c;
        }

        .getmybin-chat-send {
            background: #71b80c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            font-size: 16px;
        }

        .getmybin-chat-send:hover {
            background: #5a9409;
            transform: scale(1.05);
        }

        .getmybin-chat-send:active {
            transform: scale(0.95);
        }

        .getmybin-chat-send:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* Scrollbar Styling */
        .getmybin-chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .getmybin-chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .getmybin-chat-messages::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 3px;
        }

        .getmybin-chat-messages::-webkit-scrollbar-thumb:hover {
            background: #b0b0b0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Error Message */
        .getmybin-chat-error {
            background: #ffe0e0;
            color: #d32f2f;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <!-- Chat Icon -->
    <button class="getmybin-chat-icon" id="getmybinChatIcon" aria-label="Open chat">
        💬
    </button>

    <!-- Modal Overlay -->
    <div class="getmybin-chat-overlay" id="getmybinChatOverlay"></div>

    <!-- Chat Modal -->
    <div class="getmybin-chat-modal" id="getmybinChatModal">
        <!-- Header -->
        <div class="getmybin-chat-header">
            <div>
                <h3>GetMyBin Support</h3>
                <p>We're here to help! 🚀</p>
            </div>
            <button class="getmybin-chat-close" id="getmybinChatClose" aria-label="Close chat">
                ✕
            </button>
        </div>

        <!-- Messages -->
        <div class="getmybin-chat-messages" id="getmybinChatMessages">
            <div class="getmybin-chat-message assistant">
                <div class="getmybin-chat-bubble">
                    Hey! 👋 I'm the GetMyBin assistant. Got questions about our bin collection service? I'm here to help!
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="getmybin-chat-input-area">
            <input
                type="text"
                class="getmybin-chat-input"
                id="getmybinChatInput"
                placeholder="Ask me anything..."
                autocomplete="off"
            />
            <button class="getmybin-chat-send" id="getmybinChatSend" aria-label="Send message">
                ➤
            </button>
        </div>
    </div>

    <script>
        // Configuration
        const CHAT_CONFIG = {
            apiKey: null, // Will be set via setApiKey()
            apiEndpoint: 'https://api.openai.com/v1/chat/completions',
            model: 'gpt-3.5-turbo', // More affordable than gpt-4o
            systemPrompt: `You are the friendly and helpful GetMyBin customer support assistant. You represent a Toronto-based bin collection service.

Service Overview:
- We roll your bins to the curb for collection day and roll them back afterward
- Covers the Greater Toronto Area
- Professional, reliable service - no missed collections

Pricing:
- Recurring subscription: $5.95/week (billed weekly)
- Ad-hoc/one-time service: $8.95 per rollout
- Tax: 13% HST added at checkout (Ontario)

Current Promotion:
- New customers: Get your first rollout for just $1 (recurring subscription only)
- The $1 offer is for the first rollout/roll-in
- After the first week, it automatically converts to regular $5.95/week pricing
- You can cancel anytime with one-click cancellation

How It Works:
1. Check your collection schedule on our website
2. Sign up for recurring or book ad-hoc service
3. On collection day, we roll your bins to the curb
4. After collection, we roll them back to where they were
5. Track everything through your online dashboard

Subscription Management:
- Cancel anytime with one-click (no penalties, no customer service calls needed)
- Change your service plan in your account
- Pause/resume as needed
- Payment is automatic via Stripe

Service Areas:
- All of Greater Toronto Area (GTA)
- Coverage includes residential and some commercial properties

Contact & Support:
- Email: support@getmybin.com
- For urgent issues, email support directly
- Response time: usually within 24 hours

Payment:
- We accept all major credit cards via Stripe
- Secure, encrypted transactions
- No hidden fees (tax shown before payment)

Tone:
- Be friendly, helpful, and professional
- Use casual language (this isn't corporate)
- If you don't know something, suggest they email support@getmybin.com
- Always be positive about GetMyBin's service
- Help customers understand the value of the service`,
            maxMessages: 50
        };

        // DOM Elements
        const chatIcon = document.getElementById('getmybinChatIcon');
        const chatOverlay = document.getElementById('getmybinChatOverlay');
        const chatModal = document.getElementById('getmybinChatModal');
        const chatClose = document.getElementById('getmybinChatClose');
        const chatInput = document.getElementById('getmybinChatInput');
        const chatSend = document.getElementById('getmybinChatSend');
        const chatMessages = document.getElementById('getmybinChatMessages');

        // State
        let isOpen = false;
        let isWaitingForResponse = false;
        let conversationHistory = [];

        // API Key Setup
        window.getMyBinSetApiKey = function(apiKey) {
            CHAT_CONFIG.apiKey = apiKey;
            console.log('GetMyBin Chat: API key configured');
        };

        // Toggle Chat
        function toggleChat() {
            isOpen = !isOpen;
            if (isOpen) {
                openChat();
            } else {
                closeChat();
            }
        }

        function openChat() {
            isOpen = true;
            chatModal.classList.add('active');
            chatOverlay.classList.add('active');
            chatInput.focus();
        }

        function closeChat() {
            isOpen = false;
            chatModal.classList.remove('active');
            chatOverlay.classList.remove('active');
        }

        // Add Message to UI
        function addMessage(text, role = 'user') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `getmybin-chat-message ${role}`;

            const bubble = document.createElement('div');
            bubble.className = 'getmybin-chat-bubble';
            bubble.textContent = text;

            messageDiv.appendChild(bubble);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Add to history
            conversationHistory.push({
                role: role === 'user' ? 'user' : 'assistant',
                content: text
            });

            // Keep conversation history manageable
            if (conversationHistory.length > CHAT_CONFIG.maxMessages) {
                conversationHistory = conversationHistory.slice(-CHAT_CONFIG.maxMessages);
            }
        }

        // Show Typing Indicator
        function showTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'getmybin-chat-message assistant';
            messageDiv.id = 'typingIndicator';

            const typingDiv = document.createElement('div');
            typingDiv.className = 'getmybin-chat-typing';

            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'getmybin-chat-typing-dot';
                typingDiv.appendChild(dot);
            }

            messageDiv.appendChild(typingDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Remove Typing Indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // Send Message
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || isWaitingForResponse) return;

            if (!CHAT_CONFIG.apiKey) {
                addMessage('Error: Chat API key not configured. Please set your OpenAI API key.', 'assistant');
                return;
            }

            // Clear input
            chatInput.value = '';
            chatSend.disabled = true;

            // Add user message
            addMessage(message, 'user');

            // Show typing
            showTypingIndicator();
            isWaitingForResponse = true;

            try {
                // Build messages for API
                const messages = [
                    {
                        role: 'system',
                        content: CHAT_CONFIG.systemPrompt
                    },
                    ...conversationHistory
                ];

                // Call OpenAI API
                const response = await fetch(CHAT_CONFIG.apiEndpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CHAT_CONFIG.apiKey}`
                    },
                    body: JSON.stringify({
                        model: CHAT_CONFIG.model,
                        messages: messages,
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;

                // Remove typing indicator
                removeTypingIndicator();

                // Add assistant message
                addMessage(assistantMessage, 'assistant');

            } catch (error) {
                removeTypingIndicator();
                console.error('Chat error:', error);
                addMessage(
                    'Sorry, I encountered an error. Please try again or email support@getmybin.com for help.',
                    'assistant'
                );
            } finally {
                isWaitingForResponse = false;
                chatSend.disabled = false;
                chatInput.focus();
            }
        }

        // Event Listeners
        chatIcon.addEventListener('click', toggleChat);
        chatOverlay.addEventListener('click', closeChat);
        chatClose.addEventListener('click', closeChat);

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        chatSend.addEventListener('click', sendMessage);

        // Prevent body scroll when modal is open
        chatIcon.addEventListener('click', () => {
            if (isOpen) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        });

        chatClose.addEventListener('click', () => {
            document.body.style.overflow = '';
        });

        chatOverlay.addEventListener('click', () => {
            document.body.style.overflow = '';
        });

        // Initialize
        console.log('GetMyBin Chat Widget loaded. Call window.getMyBinSetApiKey(YOUR_API_KEY) to activate.');
    </script>
</body>
</html>
